<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Öğrenci Tanıma</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0ede8;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.bar{background:#1a1814;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
.bar h3{font-size:13px;font-weight:700;opacity:.7}
.bar button{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;background:#c9720a;color:#fff;margin-left:8px}
.page{width:210mm;min-height:297mm;background:#fff;margin:20px auto;box-shadow:0 4px 30px rgba(0,0,0,.15);overflow:hidden}
.hdr{background:linear-gradient(135deg,#b05e18,#de8f28);padding:20px 24px;color:#fff;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;right:-30px;bottom:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06)}
.hdr-row{display:flex;gap:14px;position:relative;z-index:1}
.hdr-info{flex:1}
.tip{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:9px;font-weight:800;padding:3px 10px;border-radius:99px;letter-spacing:.6px;text-transform:uppercase}
.hdr-name{font-size:22px;font-weight:900;letter-spacing:-.4px;margin-bottom:5px}
.hdr-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.65;margin-bottom:4px}
.meta{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;opacity:.82}
.foto{width:80px;height:106px;border-radius:9px;overflow:hidden;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.foto img{width:100%;height:100%;object-fit:cover}
.body{padding:16px 20px}
.s{margin-bottom:14px}
.st{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#a09a94;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.st::after{content:'';flex:1;height:1px;background:#ede8e0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.s2{grid-column:span 2}
.f{background:#f8f5f0;border-radius:7px;padding:7px 10px}
.fl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#a09a94;margin-bottom:2px}
.fv{font-size:12px;font-weight:600;color:#16130e;line-height:1.4}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;border:1px solid}
.tr{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
.tb{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
.to{background:#fff7ed;border-color:#fed7aa;color:#c2410c}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#f0ede8;color:#6b6560;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.4px;padding:5px 8px;text-align:left;border-bottom:1.5px solid #e2dbd0}
td{padding:5px 8px;border-bottom:1px solid #f0ebe2}
tr:last-child td{border-bottom:none}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dg{background:#16a34a}.dy{background:#d97706}.dr{background:#dc2626}.dn{background:#9ca3af}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ac{border-radius:8px;padding:9px 11px;border:1.5px solid}
.aca{border-color:#f0c4c4;background:linear-gradient(148deg,#fffafa,#fff)}
.acb{border-color:#c4d6f0;background:linear-gradient(148deg,#f7fbff,#fff)}
.act{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.aca .act{color:#7a1616}.acb .act{color:#163678}
.ar{display:flex;gap:5px;margin-bottom:2px;font-size:11px}
.ak{color:#a09a94;font-weight:600;min-width:30px;font-size:9.5px;flex-shrink:0}
.av{font-weight:600;color:#16130e}
.kb{border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:8px;margin-top:5px}
.kbk{background:linear-gradient(135deg,#0d4a27,#18733c);color:#fff}
.kbr{background:linear-gradient(135deg,#7f1d1d,#dc2626);color:#fff}
.kbt{background:linear-gradient(135deg,#1e3a5f,#1d4ed8);color:#fff}
.kbd{background:linear-gradient(135deg,#3d2b00,#c9720a);color:#fff}
.not{background:#fffbf0;border:1.5px solid #fde68a;border-radius:7px;padding:8px 11px;font-size:11px;line-height:1.7;color:#3d2b00;white-space:pre-wrap}
.ft{background:#f8f5f0;border-top:1px solid #e2dbd0;padding:8px 20px;display:flex;justify-content:space-between;font-size:9px;color:#a09a94}
@media print{.bar{display:none!important}body{background:#fff}.page{margin:0;box-shadow:none;width:100%}}
</style>
</head>
<body>
<div class="bar">
  <h3 id="barTitle">Öğrenci Tanıma Formu</h3>
  <div>
    <button onclick="window.print()">🖨️ Yazdır</button>
    <button onclick="window.close()" style="background:rgba(255,255,255,.1)">✕</button>
  </div>
</div>
<div class="page" id="page">
  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-info">
        <div class="hdr-name" id="elAd">—</div>
        <div class="meta" id="elMeta"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0"><div class="foto" id="elFoto">👤</div><div id="tipEl" style="background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:8px;font-weight:800;padding:2px 8px;border-radius:99px;letter-spacing:.6px;text-transform:uppercase;text-align:center">TAM FORM</div></div>
    </div>
  </div>
  <div class="body" id="elBody"></div>
  <div class="ft"><span id="ftL"></span><span id="ftR"></span></div>
</div>

<script>
// ── VERİYİ OKU ──────────────────────────────────────────────
var D = null;
var TIP = 'TAM FORM';

try {
  // 1. window.__D__ (Apps Script injection)
  if (window.__D__) { D = window.__D__; TIP = window.__TIP__ || TIP; }
  // 2. URL parametresi
  else {
    var p = new URLSearchParams(window.location.search);
    var raw = p.get('d');
    var tipParam = p.get('tip');
    if (raw) D = JSON.parse(decodeURIComponent(raw));
    if (tipParam) TIP = decodeURIComponent(tipParam);
  }
} catch(e) { console.error('Veri okuma hatası:', e); }

if (!D) {
  document.body.innerHTML = '<div style="padding:80px;text-align:center;font-family:sans-serif;color:#888"><h2>Veri bulunamadı</h2><p style="margin-top:8px">Bu sayfa admin panelinden açılmalıdır.</p></div>';
} else {
  render(D, TIP);
}

// ── RENDER ───────────────────────────────────────────────────
function g(key) {
  if (!D) return '';
  var v = D[key];
  if (v === undefined || v === null || String(v).trim() === '') return '';
  return String(v).trim();
}

function tf(t) {
  if (!t) return '';
  var m = String(t).match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[3]+'.'+m[2]+'.'+m[1];
  return t;
}

function field(label, val) {
  if (!val) return '';
  return '<div class="f"><div class="fl">'+label+'</div><div class="fv">'+val+'</div></div>';
}

function render(d, tip) {
  document.getElementById('tipEl').textContent = tip;
  
  var ad = (g('ad') + ' ' + g('soyad')).trim() || '—';
  document.getElementById('barTitle').textContent = ad + ' — ' + tip;
  document.getElementById('elAd').textContent = ad;

  // Meta
  var meta = '';
  if (g('sinif')) meta += '<span>🎓 '+g('sinif')+'</span>';
  if (g('dogum_tarihi')) meta += '<span>🎂 '+tf(g('dogum_tarihi'))+'</span>';
  if (g('okul')) meta += '<span>🏫 '+g('okul')+'</span>';
  if (g('gorusme_tarihi')) meta += '<span>📅 Görüşme: '+tf(g('gorusme_tarihi'))+'</span>';
  if (g('uzman')) meta += '<span>🧑‍💼 '+g('uzman')+'</span>';
  if (g('tc_no')) meta += '<span>🪪 TC: '+g('tc_no')+'</span>';
  document.getElementById('elMeta').innerHTML = meta;

  // Fotoğraf
  if (g('foto_url')) {
    document.getElementById('elFoto').innerHTML = '<img src="'+g('foto_url')+'" onerror="this.parentElement.textContent=\'👤\'">';
  }

  // Footer
  document.getElementById('ftL').textContent = ad + ' — Öğrenci Tanıma Formu';
  document.getElementById('ftR').textContent = 'Görüşme: '+tf(g('gorusme_tarihi'))+' · '+g('uzman');

  // Body
  var html = '';

  // 1. Tanı & Akademik
  html += '<div class="s"><div class="st">🗂️ Tanı & Akademik Durum</div>';
  html += '<div class="g2" style="margin-bottom:8px">';
  html += field('Rapor / Tanı', g('tani'));
  html += field('Temel İhtiyaç Alanı', g('temel_ihtiyac'));
  html += '</div>';
  
  var aklar = [
    ['Okuma','ak_okuma'],['Anlama','ak_anlama'],
    ['Yazma','ak_yazma'],['Matematik','ak_mat'],
    ['İfade','ak_ifade'],['Kavram','ak_kavram']
  ];
  var akHtml = '<table><thead><tr><th>Alan</th><th>Değerlendirme</th><th>Alan</th><th>Değerlendirme</th></tr></thead><tbody>';
  for (var i=0; i<aklar.length; i+=2) {
    var a1 = aklar[i], a2 = aklar[i+1];
    var v1 = g(a1[1]), v2 = g(a2[1]);
    var cls1 = v1==='Akranları düzeyinde'?'dg':v1==='Zayıf'?'dy':v1==='Çok zayıf'?'dr':'dn';
    var cls2 = v2==='Akranları düzeyinde'?'dg':v2==='Zayıf'?'dy':v2==='Çok zayıf'?'dr':'dn';
    akHtml += '<tr>';
    akHtml += '<td style="font-weight:600">'+a1[0]+'</td>';
    akHtml += '<td>'+(v1?'<span class="dot '+cls1+'"></span>'+v1:'—')+'</td>';
    akHtml += '<td style="font-weight:600">'+a2[0]+'</td>';
    akHtml += '<td>'+(v2?'<span class="dot '+cls2+'"></span>'+v2:'—')+'</td>';
    akHtml += '</tr>';
  }
  akHtml += '</tbody></table>';
  html += akHtml + '</div>';

  // 2. Sağlık
  if (g('saglik_durum')) {
    html += '<div class="s"><div class="st">🩺 Sağlık & Davranış</div><div class="tags">';
    g('saglik_durum').split(';').forEach(function(s) {
      s = s.trim(); if (s) html += '<span class="tag tr">'+s+'</span>';
    });
    html += '</div></div>';
  }

  // 3. Dil
  var dilVar = g('dil_prob') || g('dil_modul') || g('aile_dil');
  if (dilVar) {
    html += '<div class="s"><div class="st">🔤 Dil Gelişimi</div><div class="tags">';
    if (g('dil_modul') && g('dil_modul') !== 'Yok') html += '<span class="tag tb">Modül: '+g('dil_modul')+'</span>';
    if (g('aile_dil') === 'Evet') html += '<span class="tag to">Ailede dil problemi var</span>';
    if (g('dil_prob')) g('dil_prob').split(';').forEach(function(s) {
      s = s.trim(); if (s) html += '<span class="tag to">'+s+'</span>';
    });
    html += '</div></div>';
  }

  // 4. Not
  if (g('gorusme_not')) {
    html += '<div class="s"><div class="st">📝 Görüşme Notları</div><div class="not">'+g('gorusme_not')+'</div></div>';
  }

  // 5. AAA önce
  html += '<div class="s"><div class="st">⭐ AAA & Aile Değerlendirmesi</div>';
  html += '<div class="g2" style="margin-bottom:6px">';
  html += field('AAA', g('aaa'));
  html += field('Rapor Olasılığı', g('rapor_olasilik') ? g('rapor_olasilik')+' / 5' : '');
  html += '</div></div>';

  // 5b. Aile
  html += '<div class="s"><div class="st">👨‍👩‍👧 Aile Bilgileri</div>';
  html += '<div class="ag" style="margin-bottom:7px">';
  html += '<div class="ac aca"><div class="act">👩 Anne</div>';
  if (g('saglik_anne') === 'Vefat') html += '<div style="background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;margin-bottom:6px;display:inline-block">⚠️ Vefat</div>';
  html += '<div class="ar"><span class="ak">Adı</span><span class="av">'+(g('anne_ad')||'—')+'</span></div>';
  html += '<div class="ar"><span class="ak">Tel</span><span class="av">'+(g('anne_tel')||'—')+'</span></div>';
  html += '</div>';
  html += '<div class="ac acb"><div class="act">👨 Baba</div>';
  if (g('saglik_baba') === 'Vefat') html += '<div style="background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;margin-bottom:6px;display:inline-block">⚠️ Vefat</div>';
  html += '<div class="ar"><span class="ak">Adı</span><span class="av">'+(g('baba_ad')||'—')+'</span></div>';
  html += '<div class="ar"><span class="ak">Tel</span><span class="av">'+(g('baba_tel')||'—')+'</span></div>';
  html += '</div></div>';
  html += '<div class="g3">';
  html += field('Birlikte mi?', g('beraberlik'));
  html += '<div class="f s2"><div class="fl">Adres</div><div class="fv">'+(g('adres')||'—')+'</div></div>';
  html += '</div></div>';

  // 6. Rehab
  if (g('rehab') === 'Evet') {
    html += '<div class="s"><div class="st">🏥 Rehabilitasyon</div><div class="g3">';
    html += field('Durum', 'Evet');
    html += '<div class="f s2"><div class="fl">Merkez / Süre</div><div class="fv">'+[g('rehab_merkez'), g('rehab_sure') ? g('rehab_sure')+' yıl' : ''].filter(Boolean).join(' · ')+'</div></div>';
    html += '</div></div>';
  }

  // 8. Karar
  html += '<div class="s"><div class="st">✅ Karar</div>';
  var karar = g('karar') || '—';
  var kbCls = /kayded/i.test(karar)?'kbk':/^red$/i.test(karar.trim())?'kbr':/takip/i.test(karar)?'kbt':'kbd';
  html += '<div class="kb '+kbCls+'"><span class="ki">📋</span><span class="kt">'+karar+'</span></div>';
  html += '</div>';

  // 9. Kimlik fotoğrafı (ikinci sayfa)
  if (g('kimlik_url')) {
    html += '<div style="page-break-before:always;padding:20px;text-align:center">';
    html += '<div class="st" style="margin-bottom:12px">🪪 Kimlik Fotoğrafı</div>';
    html += '<img src="'+g('kimlik_url')+'" style="max-width:100%;max-height:400px;border-radius:10px;border:1px solid #e2dbd0;box-shadow:0 2px 12px rgba(0,0,0,.1)">';
    html += '</div>';
  }

  document.getElementById('elBody').innerHTML = html;
}
</script>
</body>
</html>
