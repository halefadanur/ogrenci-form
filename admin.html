<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Öğrenci Admin</title>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── TEMA DEĞİŞKENLERİ ── */
:root{
  --bg:#0a0908;
  --surf:#131210;
  --surf2:#1c1a17;
  --surf3:#242118;
  --br:#d4780c;--br2:#f59d30;--brbg:rgba(212,120,12,.12);
  --text:#f2ede6;--sub:#7a7060;--muted:#3d3830;
  --bd:#201e1a;
  --red:#c0392b;--green:#16a34a;--blue:#2563eb;
  --shadow:0 2px 16px rgba(0,0,0,.5);
  color-scheme:dark;
}
:root.light{
  --bg:#f8f4ef;
  --surf:#ffffff;
  --surf2:#f2ede6;
  --surf3:#ebe5dc;
  --br:#c8700a;--br2:#a85c08;--brbg:rgba(200,112,10,.1);
  --text:#1a1610;--sub:#7a6a58;--muted:#c0b8ae;
  --bd:#e8e0d4;
  --red:#c0392b;--green:#16a34a;--blue:#2563eb;
  --shadow:0 2px 16px rgba(0,0,0,.08);
  color-scheme:light;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── GİRİŞ ── */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 40%, rgba(212,120,12,.08) 0%, transparent 60%),
             radial-gradient(ellipse at 70% 80%, rgba(212,120,12,.04) 0%, transparent 50%),
             var(--bg);
}
.login-box{
  background:var(--surf);
  border:1px solid var(--bd);
  border-radius:24px;
  padding:44px 40px;
  width:100%;max-width:360px;
  box-shadow:var(--shadow);
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.login-mark{
  width:52px;height:52px;background:var(--brbg);border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  margin:0 auto 20px;border:1px solid rgba(212,120,12,.2);
}
.login-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px;letter-spacing:-.3px}
.login-sub{font-size:13px;color:var(--sub);text-align:center;margin-bottom:28px}
.login-box input{
  width:100%;background:var(--surf2);border:1.5px solid var(--bd);
  border-radius:12px;padding:13px 16px;font-size:15px;
  font-family:inherit;color:var(--text);outline:none;
  margin-bottom:12px;transition:border-color .2s;
}
.login-box input:focus{border-color:var(--br)}
.login-btn{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--br),var(--br2));
  color:#fff;border:none;border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit;letter-spacing:.2px;transition:opacity .2s;
}
.login-btn:hover{opacity:.88}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;display:none}

/* ── UYGULAMA KABUK ── */
.app{display:none;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOPBAR ── */
.topbar{
  background:var(--surf);
  border-bottom:1px solid var(--bd);
  padding:0 20px;
  display:flex;align-items:center;gap:10px;
  height:52px;
  position:relative;z-index:50;
  flex-shrink:0;
}
.topbar-logo{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:700;letter-spacing:-.2px;flex:1;
}
.topbar-logo-dot{
  width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,var(--br),var(--br2));
  box-shadow:0 0 8px rgba(212,120,12,.5);
}
.tcount{
  font-size:11px;color:var(--sub);
  background:var(--surf2);padding:3px 10px;
  border-radius:99px;font-family:'DM Mono',monospace;
  white-space:nowrap;
}
.tbtn{
  background:transparent;border:1px solid var(--bd);
  color:var(--sub);padding:6px 12px;
  border-radius:8px;font-size:12px;font-weight:500;
  cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;
}
.tbtn:hover{border-color:var(--br);color:var(--br2)}
.tbtn-primary{
  background:var(--brbg);border-color:var(--br);
  color:var(--br2);font-weight:600;
}
.tbtn-primary:hover{background:rgba(212,120,12,.2)}
.tbtn-green{border-color:rgba(22,163,74,.4);color:#4ade80}
.tbtn-green:hover{background:rgba(22,163,74,.1)}
#temaBtn{font-size:15px;padding:6px 10px;border-radius:8px}

/* ── STAT KARTLAR ── */
.stat-row{
  display:flex;gap:0;
  border-bottom:1px solid var(--bd);
  background:var(--surf);
  flex-shrink:0;
  overflow-x:auto;
}
.stat-card{
  flex:1;min-width:100px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:14px 8px 12px;
  gap:3px;cursor:pointer;
  border-right:1px solid var(--bd);
  transition:background .15s;
  position:relative;
}
.stat-card:last-child{border-right:none}
.stat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:transparent;transition:background .15s;
}
.stat-card:hover{background:var(--surf2)}
.stat-card.aktif::after{background:var(--br)}
.stat-card.aktif{background:var(--brbg)}
.stat-num{
  font-size:22px;font-weight:800;line-height:1;
  font-family:'DM Mono',monospace;color:var(--text);
}
.stat-card.s-green .stat-num{color:#4ade80}
.stat-card.s-orange .stat-num{color:var(--br2)}
.stat-card.s-blue .stat-num{color:#60a5fa}
.stat-card.s-red .stat-num{color:#f87171}
.stat-card.s-purple .stat-num{color:#a78bfa}
.stat-lbl{
  font-size:9.5px;font-weight:600;color:var(--sub);
  text-transform:uppercase;letter-spacing:.6px;text-align:center;
  line-height:1.3;
}

/* ── FİLTRE BARI ── */
.filter-bar{
  padding:10px 16px;background:var(--surf);
  border-bottom:1px solid var(--bd);
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  flex-shrink:0;
}
.search-wrap{
  flex:1;min-width:180px;
  position:relative;
  display:flex;align-items:center;
}
.search-wrap svg{
  position:absolute;left:11px;color:var(--sub);
  width:14px;height:14px;flex-shrink:0;
}
.search-inp{
  width:100%;
  background:var(--surf2);border:1.5px solid var(--bd);
  border-radius:10px;padding:8px 12px 8px 34px;
  font-size:13px;font-family:inherit;color:var(--text);
  outline:none;transition:border-color .2s;
}
.search-inp:focus{border-color:var(--br)}
.fsel{
  background:var(--surf2);border:1.5px solid var(--bd);
  border-radius:10px;padding:7px 10px;
  font-size:12px;font-family:inherit;color:var(--text);
  outline:none;cursor:pointer;-webkit-appearance:none;
  transition:border-color .2s;
}
.fsel:focus{border-color:var(--br)}

/* Drop */
.drop-wrap{position:relative;display:inline-block}
.drop-btn{
  background:var(--surf2);border:1.5px solid var(--bd);
  border-radius:10px;padding:7px 11px;
  font-size:12px;font-weight:600;cursor:pointer;
  color:var(--sub);font-family:inherit;
  display:inline-flex;align-items:center;gap:5px;
  transition:all .15s;white-space:nowrap;
}
.drop-btn:hover,.drop-btn.has-gizli{border-color:var(--br);color:var(--br2)}
.drop-btn .arr{font-size:8px;transition:transform .2s}
.drop-wrap.open .drop-btn .arr{transform:rotate(180deg)}
.drop-menu{
  position:absolute;top:calc(100% + 5px);left:0;
  background:var(--surf);border:1.5px solid var(--bd);
  border-radius:14px;padding:10px;
  min-width:220px;max-width:340px;
  z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.4);
  display:none;flex-wrap:wrap;gap:6px;
}
.drop-wrap.open .drop-menu{display:flex}
.tani-chip{
  padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;
  cursor:pointer;border:1.5px solid var(--bd);color:var(--sub);
  background:transparent;transition:all .12s;font-family:inherit;white-space:nowrap;
}
.tani-chip.gizli{opacity:.35;text-decoration:line-through;border-color:var(--red);color:#f87171}
.tani-chip:hover{border-color:var(--br);color:var(--br2)}

/* ── TABLO ── */
.table-wrap{flex:1;overflow:auto}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table thead{position:sticky;top:0;z-index:10}
.table th{
  background:var(--surf);color:var(--sub);
  font-weight:600;font-size:10px;text-transform:uppercase;
  letter-spacing:.6px;padding:10px 14px;text-align:left;
  border-bottom:1.5px solid var(--bd);
  white-space:nowrap;cursor:pointer;user-select:none;
}
.table th:hover{color:var(--br2)}
.table td{
  padding:11px 14px;border-bottom:1px solid var(--bd);
  vertical-align:middle;
}
.table tr:hover td{background:var(--surf2)}
.table tr:last-child td{border-bottom:none}

/* Foto */
.avatar{
  width:34px;height:44px;border-radius:6px;
  overflow:hidden;border:1px solid var(--bd);
  background:var(--surf2);display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;
}
.avatar img{width:100%;height:100%;object-fit:cover}
.name-cell{display:flex;align-items:center;gap:10px}
.name-info strong{display:block;font-size:13px;font-weight:600;color:var(--text)}
.name-info span{font-size:11px;color:var(--sub);font-family:'DM Mono',monospace}

/* Badge */
.badge{
  display:inline-flex;align-items:center;
  padding:3px 8px;border-radius:6px;
  font-size:11px;font-weight:600;white-space:nowrap;
  border:1px solid transparent;
}
.b-green{background:rgba(22,163,74,.12);color:#4ade80;border-color:rgba(22,163,74,.2)}
.b-orange{background:rgba(212,120,12,.12);color:var(--br2);border-color:rgba(212,120,12,.2)}
.b-red{background:rgba(192,57,43,.12);color:#f87171;border-color:rgba(192,57,43,.2)}
.b-blue{background:rgba(37,99,235,.12);color:#60a5fa;border-color:rgba(37,99,235,.2)}
.b-gray{background:var(--surf3);color:var(--sub);border-color:var(--bd)}

/* Aksiyon butonları */
.act-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 10px;border-radius:7px;font-size:11px;font-weight:600;
  cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap;
}
.act-pdf{background:linear-gradient(135deg,var(--br),var(--br2));color:#fff}
.act-pdf:hover{opacity:.85}
.act-edit{background:var(--surf3);color:var(--sub);border:1px solid var(--bd)}
.act-edit:hover{border-color:var(--br);color:var(--br2)}

/* Yeni dot */
.dot-new{
  width:6px;height:6px;border-radius:50%;
  background:var(--br2);display:inline-block;
  margin-right:5px;vertical-align:middle;
  box-shadow:0 0 4px var(--br2);
}

/* Checkbox */
.row-check{width:15px;height:15px;cursor:pointer;accent-color:var(--br)}

/* State */
.state{padding:60px 24px;text-align:center;color:var(--sub)}
.state-ico{font-size:36px;margin-bottom:12px}
.state p{font-size:14px}
.hidden{display:none!important}

/* ── TOPLU BAR ── */
.toplu-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:999;
  display:none;align-items:center;justify-content:center;gap:10px;
  padding:14px 20px;
  background:var(--surf);
  border-top:2px solid var(--br);
  box-shadow:0 -8px 32px rgba(0,0,0,.4);
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.34,1.4,.64,1);
}
.toplu-bar.visible{display:flex;transform:translateY(0)}
.toplu-info{
  font-size:13px;font-weight:700;color:var(--br2);
  background:var(--brbg);padding:5px 14px;border-radius:8px;
  border:1px solid rgba(212,120,12,.3);
  font-family:'DM Mono',monospace;
}

/* ── MOBİL ── */
@media(max-width:640px){
  .topbar{height:auto;padding:10px 14px;gap:8px;flex-wrap:wrap}
  .mobil-gizle{display:none!important}
  .stat-row{overflow-x:auto;flex-wrap:nowrap}
  .stat-card{min-width:80px;padding:10px 8px}
  .stat-num{font-size:18px}
  .filter-bar{padding:8px 10px;gap:6px}
  .search-inp{min-width:0}
  .fsel{font-size:11px;padding:6px 8px}
  .table th:nth-child(5),.table td:nth-child(5),
  .table th:nth-child(6),.table td:nth-child(6),
  .table th:nth-child(8),.table td:nth-child(8){display:none}
  .table th,.table td{padding:8px 8px}
  .toplu-bar{flex-direction:column;padding:12px 16px;gap:8px}
  .toplu-bar .tbtn,.toplu-bar .tbtn-primary{width:100%;justify-content:center;padding:10px}
}
</style>
</head>
<body>

<!-- ── GİRİŞ ── -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-mark">📋</div>
    <div class="login-title">Admin Paneli</div>
    <div class="login-sub">Öğrenci Tanıma Sistemi</div>
    <input type="password" id="sifreInput" placeholder="Şifre" onkeydown="if(event.key==='Enter')girisYap()">
    <button class="login-btn" onclick="girisYap()">Giriş</button>
    <div class="login-err" id="loginErr">Hatalı şifre</div>
  </div>
</div>

<!-- ── UYGULAMA ── -->
<div class="app" id="appWrap">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-dot"></div>
      Öğrenci Admin
    </div>
    <div class="tcount" id="topbarCount">— öğrenci</div>
    <button class="tbtn tbtn-primary" onclick="window.open('https://halefadanur.github.io/ogrenci-form/form.html','_blank')">+ Yeni Form</button>
    <button class="tbtn tbtn-green mobil-gizle" onclick="excelIndir()">↓ Excel</button>
    <button class="tbtn" id="temaBtn" onclick="temaToggle()" title="Tema">🌙</button>
    <button class="tbtn mobil-gizle" onclick="cikisYap()">Çıkış</button>
  </div>

  <!-- Stat kartlar -->
  <div class="stat-row" id="statBar">
    <div class="stat-card" onclick="statFiltrele('')">
      <div class="stat-num" id="statToplam">—</div>
      <div class="stat-lbl">Toplam</div>
    </div>
    <div class="stat-card s-green" onclick="statFiltrele('kayitli')">
      <div class="stat-num" id="statKayitli">—</div>
      <div class="stat-lbl">Kayıtlı</div>
    </div>
    <div class="stat-card s-orange" onclick="statFiltrele('islemde')">
      <div class="stat-num" id="statIslemde">—</div>
      <div class="stat-lbl">İşlemde</div>
    </div>
    <div class="stat-card s-blue" onclick="statFiltrele('aile')">
      <div class="stat-num" id="statAile">—</div>
      <div class="stat-lbl">Aile<br>Düşünecek</div>
    </div>
    <div class="stat-card s-red" onclick="statFiltrele('takip')">
      <div class="stat-num" id="statTakip">—</div>
      <div class="stat-lbl">Takipte</div>
    </div>
  </div>

  <!-- Filtreler -->
  <div class="filter-bar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="search-inp" type="text" id="aramaInput" placeholder="Ad, okul, uzman, tanı, karar..." oninput="filtrele()">
    </div>
    <select class="fsel" id="sortSel" onchange="filtrele()">
      <option value="guncelleme">↓ Son Güncelleme</option>
      <option value="tarih">↓ Görüşme Tarihi</option>
      <option value="ad">A→Z Ad</option>
      <option value="tani">Tanı</option>
      <option value="karar">Karar</option>
      <option value="uzman">Uzman</option>
    </select>
    <select class="fsel" id="uzmanSel" onchange="filtrele()">
      <option value="">Tüm Uzmanlar</option>
    </select>
    <select class="fsel" id="kararSel" onchange="filtrele()">
      <option value="">Tüm Kararlar</option>
    </select>
    <div class="drop-wrap" id="taniDropWrap">
      <button class="drop-btn" id="taniDropBtn" onclick="toggleDrop('tani')">Tanı Gizle <span class="arr">▾</span></button>
      <div class="drop-menu" id="taniFilters"></div>
    </div>
    <div class="drop-wrap" id="kararDropWrap">
      <button class="drop-btn" id="kararDropBtn" onclick="toggleDrop('karar')">Karar Gizle <span class="arr">▾</span></button>
      <div class="drop-menu" id="kararFilters"></div>
    </div>
  </div>

  <!-- Tablo -->
  <div class="table-wrap">
    <div class="state" id="loadingState">
      <div class="state-ico">⏳</div>
      <p>Yükleniyor...</p>
    </div>
    <div class="state hidden" id="emptyState">
      <div class="state-ico">📭</div>
      <p>Kayıt bulunamadı</p>
    </div>
    <table class="table hidden" id="mainTable">
      <thead>
        <tr>
          <th style="width:36px;padding-left:16px">
            <input type="checkbox" id="checkAll" onclick="tumSecToggle(this)" style="cursor:pointer;accent-color:var(--br)">
          </th>
          <th onclick="sortBy('ad')">Öğrenci</th>
          <th onclick="sortBy('tarih')">Görüşme</th>
          <th>Sınıf</th>
          <th onclick="sortBy('tani')">Tanı</th>
          <th onclick="sortBy('karar')">Karar</th>
          <th onclick="sortBy('uzman')">Uzman</th>
          <th>İşlemler</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- Toplu işlem çubuğu -->
  <div class="toplu-bar" id="topluBar">
    <span class="toplu-info" id="topluCount">0 seçildi</span>
    <button class="tbtn tbtn-primary" onclick="topluPdf()" style="padding:9px 18px;font-size:13px;">📄 Seçililerin PDF'ini Aç</button>
    <button class="tbtn" onclick="secimTemizle()" style="font-size:13px;">✕ Seçimi Kaldır</button>
  </div>

</div>

<script>
// ── TEMA ──────────────────────────────────────────
function temaUygula(t) {
  const isLight = t==='light';
  document.documentElement.classList.toggle('light', isLight);
  document.getElementById('temaBtn').textContent = isLight ? '☀️' : '🌙';
}
function temaToggle() {
  const yeni = document.documentElement.classList.contains('light') ? 'dark' : 'light';
  localStorage.setItem('adminTema', yeni);
  temaUygula(yeni);
}
(function(){
  const k = localStorage.getItem('adminTema')||'dark';
  if(k==='light') document.documentElement.classList.add('light');
})();

// ── SABITLER ──────────────────────────────────────
const SUPA_URL = "https://zciraijmwxcwhryidlki.supabase.co";
const SUPA_KEY = "sb_publishable_G1M4C_upyM7SMh59AOEhEA_pJ4MvEou";
const PDF_URL  = "https://halefadanur.github.io/ogrenci-form/pdf.html";
const SIFRE    = "enabiz2026";

let tumVeriler = [], filtreliVeriler = [];
let gizliTaniler = new Set(), gizliKararlar = new Set();

// ── GİRİŞ ──────────────────────────────────────────
function girisYap() {
  const s = document.getElementById('sifreInput').value;
  if(s===SIFRE){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('appWrap').style.display='flex';
    sessionStorage.setItem('admin_auth','1');
    verileriYukle();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('sifreInput').value='';
    document.getElementById('sifreInput').focus();
  }
}
function cikisYap(){
  sessionStorage.removeItem('admin_auth');
  document.getElementById('appWrap').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
}
if(sessionStorage.getItem('admin_auth')==='1'){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('appWrap').style.display='flex';
  verileriYukle();
}

// ── VERİ YÜKLEME ───────────────────────────────────
async function verileriYukle(){
  try{
    let all=[], from=0;
    while(true){
      const to=from+999;
      const res=await fetch(SUPA_URL+'/rest/v1/ogrenciler?order=created_at.desc',{
        headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Range':from+'-'+to,'Range-Unit':'items'}
      });
      const data=await res.json();
      if(!data||!data.length) break;
      all=all.concat(data);
      if(data.length<1000) break;
      from+=1000;
    }
    tumVeriler=all;
    filtreliVeriler=tumVeriler;
    document.getElementById('topbarCount').textContent=tumVeriler.length+' öğrenci';
    taniFiltrelerOlustur(); kararFiltrelerOlustur();
    uzmanKararDoldur(); filtrele(); istatistikGuncelle();
  } catch(e){
    document.getElementById('loadingState').innerHTML='<div class="state-ico">❌</div><p>Veri yüklenemedi</p>';
  }
}

// ── İSTATİSTİK ─────────────────────────────────────
const KAYITLI=['KAYDEDİLDİ','Özel Ders Alacak'];
const ISLEMDE=['İşlemde'];
const AILE=['Aile Düşünecek','Başka Kurumda Kayıtlı, DÜŞÜNECEK.','Başka Kurumda Kayıtlı, KAYDOLACAK'];
const TAKIP=['Takibe Alındı (MHRS var)','Takibe Alındı (MHRS yok)'];

function istatistikGuncelle(){
  document.getElementById('statToplam').textContent  = tumVeriler.length;
  document.getElementById('statKayitli').textContent = tumVeriler.filter(r=>KAYITLI.includes(r.karar)).length;
  document.getElementById('statIslemde').textContent = tumVeriler.filter(r=>ISLEMDE.includes(r.karar)).length;
  document.getElementById('statAile').textContent    = tumVeriler.filter(r=>AILE.includes(r.karar)).length;
  document.getElementById('statTakip').textContent   = tumVeriler.filter(r=>TAKIP.includes(r.karar)).length;
}

function statFiltrele(tip){
  document.getElementById('aramaInput').value='';
  window._statFiltre = tip==='kayitli'?KAYITLI:tip==='islemde'?ISLEMDE:tip==='aile'?AILE:tip==='takip'?TAKIP:null;
  document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('aktif'));
  if(tip && event && event.currentTarget) event.currentTarget.classList.add('aktif');
  filtrele();
}

// ── FİLTRELEME ─────────────────────────────────────
function trLower(s){return String(s||'').replace(/İ/g,'i').replace(/I/g,'ı').toLowerCase();}

function filtrele(){
  const q=trLower(document.getElementById('aramaInput').value.trim());
  const uzman=document.getElementById('uzmanSel').value;
  const karar=document.getElementById('kararSel').value;
  const sort=document.getElementById('sortSel').value;

  let veriler=tumVeriler.filter(r=>{
    if(gizliTaniler.has(r.tani)) return false;
    if(gizliKararlar.has(r.karar)) return false;
    if(uzman && r.uzman!==uzman) return false;
    if(karar && r.karar!==karar) return false;
    if(window._statFiltre && !window._statFiltre.includes(r.karar)) return false;
    if(q){
      const hay=trLower((r.ad||'')+' '+(r.soyad||'')+' '+(r.tani||'')+' '+(r.karar||'')+' '+(r.uzman||'')+' '+(r.okul||''));
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  veriler.sort((a,b)=>{
    let va,vb;
    if(sort==='guncelleme'){va=a.created_at||'';vb=b.created_at||'';return vb.localeCompare(va);}
    if(sort==='tarih'){va=a.gorusme_tarihi||'';vb=b.gorusme_tarihi||'';return vb.localeCompare(va);}
    if(sort==='ad'){va=trLower((a.ad||'')+' '+(a.soyad||''));vb=trLower((b.ad||'')+' '+(b.soyad||''));return va.localeCompare(vb,'tr');}
    if(sort==='tani'){return (a.tani||'').localeCompare(b.tani||'','tr');}
    if(sort==='karar'){return (a.karar||'').localeCompare(b.karar||'','tr');}
    if(sort==='uzman'){return (a.uzman||'').localeCompare(b.uzman||'','tr');}
    return 0;
  });

  filtreliVeriler=veriler;
  document.getElementById('topbarCount').textContent=veriler.length+'/'+tumVeriler.length+' öğrenci';
  tabloyuGoster(veriler);
}

function sortBy(f){
  const m={ad:'ad',tarih:'tarih',tani:'tani',karar:'karar',uzman:'uzman'};
  if(m[f]) document.getElementById('sortSel').value=m[f];
  filtrele();
}

// ── FİLTRE PANELLERİ ───────────────────────────────
function toggleDrop(tip){
  const wrap=document.getElementById(tip+'DropWrap');
  const isOpen=wrap.classList.contains('open');
  document.querySelectorAll('.drop-wrap').forEach(w=>w.classList.remove('open'));
  if(!isOpen) wrap.classList.add('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.drop-wrap')) document.querySelectorAll('.drop-wrap').forEach(w=>w.classList.remove('open'));
});

function gizliSayiGuncelle(){
  const tBtn=document.getElementById('taniDropBtn');
  const kBtn=document.getElementById('kararDropBtn');
  const ts=gizliTaniler.size, ks=gizliKararlar.size;
  tBtn.innerHTML='Tanı Gizle'+(ts?` <span style="background:var(--br);color:#fff;border-radius:99px;padding:1px 7px;font-size:10px">${ts}</span>`:'')+'  <span class="arr">▾</span>';
  kBtn.innerHTML='Karar Gizle'+(ks?` <span style="background:var(--br);color:#fff;border-radius:99px;padding:1px 7px;font-size:10px">${ks}</span>`:'')+'  <span class="arr">▾</span>';
  tBtn.classList.toggle('has-gizli',ts>0);
  kBtn.classList.toggle('has-gizli',ks>0);
}

function taniFiltrelerOlustur(){
  const wrap=document.getElementById('taniFilters');
  wrap.innerHTML='';
  [...new Set(tumVeriler.map(r=>r.tani).filter(Boolean))].sort().forEach(t=>{
    const btn=document.createElement('button');
    btn.className='tani-chip'; btn.textContent=t;
    btn.onclick=()=>{
      if(gizliTaniler.has(t)){gizliTaniler.delete(t);btn.classList.remove('gizli');}
      else{gizliTaniler.add(t);btn.classList.add('gizli');}
      gizliSayiGuncelle(); filtrele();
    };
    wrap.appendChild(btn);
  });
}

function kararFiltrelerOlustur(){
  const wrap=document.getElementById('kararFilters');
  wrap.innerHTML='';
  [...new Set(tumVeriler.map(r=>r.karar).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'tr')).forEach(k=>{
    const btn=document.createElement('button');
    btn.className='tani-chip'; btn.textContent=k;
    btn.onclick=()=>{
      if(gizliKararlar.has(k)){gizliKararlar.delete(k);btn.classList.remove('gizli');}
      else{gizliKararlar.add(k);btn.classList.add('gizli');}
      gizliSayiGuncelle(); filtrele();
    };
    wrap.appendChild(btn);
  });
}

function uzmanKararDoldur(){
  const uSel=document.getElementById('uzmanSel');
  const kSel=document.getElementById('kararSel');
  [...new Set(tumVeriler.map(r=>r.uzman).filter(Boolean))].sort().forEach(u=>{
    const o=document.createElement('option'); o.value=u; o.textContent=u; uSel.appendChild(o);
  });
  [...new Set(tumVeriler.map(r=>r.karar).filter(Boolean))].sort().forEach(k=>{
    const o=document.createElement('option'); o.value=k; o.textContent=k; kSel.appendChild(o);
  });
}

// ── TABLO RENDER ───────────────────────────────────
function isYeni(r){return r.created_at&&(Date.now()-new Date(r.created_at).getTime())<86400000;}
function tarihFormat(t){if(!t)return'';const m=String(t).match(/(\d{4})-(\d{2})-(\d{2})/);return m?m[3]+'.'+m[2]+'.'+m[1]:t;}

function taniBadge(t){
  if(!t) return 'b-gray';
  if(t.includes('Raporlu')) return 'b-green';
  if(t.includes('Aday')) return 'b-orange';
  return 'b-gray';
}
function kararBadge(k){
  if(!k) return 'b-gray';
  if(k==='KAYDEDİLDİ') return 'b-green';
  if(k==='RED') return 'b-red';
  if(k.includes('Takibe')) return 'b-blue';
  if(k==='Özel Ders Alacak') return 'b-green';
  if(k==='İşlemde') return 'b-orange';
  return 'b-gray';
}

function tabloyuGoster(veriler){
  document.getElementById('loadingState').classList.add('hidden');
  const tbody=document.getElementById('tableBody');
  tbody.innerHTML='';

  if(!veriler.length){
    document.getElementById('emptyState').classList.remove('hidden');
    document.getElementById('mainTable').classList.add('hidden');
    return;
  }
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('mainTable').classList.remove('hidden');

  veriler.forEach(r=>{
    const tr=document.createElement('tr');
    const fotoHtml=r.foto_url
      ?`<div class="avatar"><img src="${r.foto_url}" onerror="this.parentElement.textContent='👤'"></div>`
      :`<div class="avatar">👤</div>`;
    const dogum=r.dogum_tarihi?tarihFormat(r.dogum_tarihi):'';
    const yeniDot=isYeni(r)?'<span class="dot-new" title="Son 24 saatte eklendi"></span>':'';
    tr.dataset.id=r.id;
    tr.innerHTML=`
      <td style="padding-left:16px"><input type="checkbox" class="row-check" value="${r.id}" onclick="satırSec(event)"></td>
      <td>
        <div class="name-cell">
          ${fotoHtml}
          <div class="name-info">
            <strong>${yeniDot}${r.ad||''} ${r.soyad||''}</strong>
            <span>${dogum}</span>
          </div>
        </div>
      </td>
      <td style="font-size:12px;color:var(--sub);font-family:'DM Mono',monospace">${tarihFormat(r.gorusme_tarihi)||'—'}</td>
      <td>${r.sinif?`<span class="badge b-blue">${r.sinif}</span>`:'—'}</td>
      <td>${r.tani?`<span class="badge ${taniBadge(r.tani)}">${r.tani}</span>`:'—'}</td>
      <td>${r.karar?`<span class="badge ${kararBadge(r.karar)}">${r.karar}</span>`:'—'}</td>
      <td style="font-size:12px;color:var(--sub)">${r.uzman||'—'}</td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="act-btn act-pdf" onclick="pdfAc('${r.id}',this)">📄 PDF</button>
          <button class="act-btn act-edit" onclick="duzenle('${r.id}')">✏️ Düzenle</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// ── PDF & DÜZENLE ──────────────────────────────────
function duzenle(id){window.open('https://halefadanur.github.io/ogrenci-form/edit.html?id='+id+'&admin=1','_blank');}

async function pdfAc(id,btn){
  if(!id) return;
  const orig=btn.innerHTML; btn.innerHTML='⏳'; btn.disabled=true;
  try{
    const res=await fetch(SUPA_URL+'/rest/v1/ogrenciler?id=eq.'+id,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    const data=await res.json();
    if(data&&data[0]) window.open(PDF_URL+'?v='+Date.now()+'&d='+encodeURIComponent(JSON.stringify(data[0]))+'&tip=TAM+FORM','_blank');
  } catch(e){alert('Hata: '+e.message);}
  btn.innerHTML=orig; btn.disabled=false;
}

// ── EXCEL ──────────────────────────────────────────
function excelIndir(){
  if(!filtreliVeriler.length){alert('İndirilecek kayıt yok.');return;}
  const satirlar=filtreliVeriler.map(r=>({'Ad':r.ad||'','Soyad':r.soyad||'','Doğum':r.dogum_tarihi||'','Görüşme':r.gorusme_tarihi||'','Uzman':r.uzman||'','Okul':r.okul||'','Sınıf':r.sinif||'','Tanı':r.tani||'','Karar':r.karar||'','Anne Adı':r.anne_ad||'','Anne Tel':r.anne_tel||'','Baba Adı':r.baba_ad||'','Baba Tel':r.baba_tel||'','TC':r.tc_no||'','Adres':r.adres||'','İhtiyaç':r.temel_ihtiyac||'','Görüşme Notu':r.gorusme_not||'','Yönetici Notu':r.yonetici_notu||'','Rehber Notu':r.rehber_notu||'','Rapor':r.rapor_olasilik||''}));
  const ws=XLSX.utils.json_to_sheet(satirlar);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Öğrenciler');
  XLSX.writeFile(wb,'ogrenciler_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

// ── TOPLU SEÇİM & PDF ─────────────────────────────
let seciliIdler=new Set();

function satırSec(e){
  e.stopPropagation();
  const cb=e.target;
  if(cb.checked) seciliIdler.add(cb.value); else seciliIdler.delete(cb.value);
  topluBarGuncelle();
}
function tumSecToggle(cb){
  seciliIdler.clear();
  document.querySelectorAll('.row-check').forEach(c=>{c.checked=cb.checked;if(cb.checked)seciliIdler.add(c.value);});
  topluBarGuncelle();
}
function topluBarGuncelle(){
  const bar=document.getElementById('topluBar');
  const cnt=document.getElementById('topluCount');
  if(seciliIdler.size>0){bar.classList.add('visible');cnt.textContent=seciliIdler.size+' öğrenci seçildi';}
  else bar.classList.remove('visible');
  const all=document.querySelectorAll('.row-check');
  const allCb=document.getElementById('checkAll');
  if(allCb) allCb.checked=all.length>0&&seciliIdler.size===all.length;
}
function secimTemizle(){
  seciliIdler.clear();
  document.querySelectorAll('.row-check').forEach(c=>c.checked=false);
  const allCb=document.getElementById('checkAll');
  if(allCb) allCb.checked=false;
  topluBarGuncelle();
}

async function topluPdf(){
  if(!seciliIdler.size) return;

  const btn=document.querySelector('#topluBar .tbtn-primary');

}
