<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Öğrenci Admin</title>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;outline:none}
:root {
  --bg:#09090b;--surf:#18181b;--surf-rgb:24,24,27;--surf2:#27272a;--bd:#27272a;
  --br:#6366f1;--brbg:rgba(99,102,241,0.15);--text:#fafafa;--sub:#a1a1aa;
  --red:#ef4444;--red-bg:rgba(239,68,68,0.15);
  --green:#10b981;--green-bg:rgba(16,185,129,0.15);
  --orange:#f59e0b;--orange-bg:rgba(245,158,11,0.15);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,0.15);
  color-scheme:dark;
}
:root.light {
  --bg:#f8fafc;--surf:#ffffff;--surf-rgb:255,255,255;--surf2:#f1f5f9;--bd:#e2e8f0;
  --br:#4f46e5;--brbg:rgba(79,70,229,0.1);--text:#0f172a;--sub:#64748b;
  --red:#ef4444;--red-bg:rgba(239,68,68,0.1);
  --green:#10b981;--green-bg:rgba(16,185,129,0.1);
  --orange:#f59e0b;--orange-bg:rgba(245,158,11,0.1);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,0.1);
  color-scheme:light;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--surf);border:1px solid var(--bd);border-radius:24px;padding:48px 40px;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.login-box input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:14px;color:var(--text);margin-bottom:16px;}
.login-box input:focus{border-color:var(--br);}
.login-btn{width:100%;padding:14px;background:var(--br);color:#fff;border:none;border-radius:12px;font-weight:600;cursor:pointer;}
h1.ltitle{text-align:center;font-size:24px;margin-bottom:24px;}
.app{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{background:rgba(var(--surf-rgb),0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;gap:12px;align-items:center;z-index:100;}
.tcount{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--sub);background:var(--surf2);padding:6px 12px;border-radius:99px;}
.tbtn{background:var(--surf);border:1px solid var(--bd);color:var(--text);padding:8px 14px;border-radius:10px;cursor:pointer;font-weight:600;}
.tbtn-primary{background:var(--br);color:#fff;border:none;}
.tbtn-green{color:var(--green);background:var(--green-bg);border:none;}
.stat-row{display:flex;gap:16px;padding:24px;overflow-x:auto;border-bottom:1px solid var(--bd);}
.stat-card{flex:1;min-width:150px;background:var(--surf);border:1px solid var(--bd);border-radius:16px;padding:20px;cursor:pointer;transition:all 0.2s;}
.stat-card:hover{transform:translateY(-2px);}
.stat-card[onclick*="('')"]{background:linear-gradient(145deg,var(--surf2),var(--surf));}
.stat-card[onclick*="('')"].aktif{border-color:var(--text);box-shadow:0 4px 16px rgba(255,255,255,0.05);}
.stat-card[onclick*="'kayitli'"]{background:linear-gradient(145deg,rgba(16,185,129,0.12),rgba(16,185,129,0.02));border-color:rgba(16,185,129,0.2);}
.stat-card[onclick*="'kayitli'"].aktif{background:rgba(16,185,129,0.18);border-color:var(--green);box-shadow:0 4px 16px rgba(16,185,129,0.1);}
.stat-card[onclick*="'islemde'"]{background:linear-gradient(145deg,rgba(245,158,11,0.12),rgba(245,158,11,0.02));border-color:rgba(245,158,11,0.2);}
.stat-card[onclick*="'islemde'"].aktif{background:rgba(245,158,11,0.18);border-color:var(--orange);box-shadow:0 4px 16px rgba(245,158,11,0.1);}
.stat-card[onclick*="'aile'"]{background:linear-gradient(145deg,rgba(99,102,241,0.12),rgba(99,102,241,0.02));border-color:rgba(99,102,241,0.2);}
.stat-card[onclick*="'aile'"].aktif{background:rgba(99,102,241,0.18);border-color:var(--br);box-shadow:0 4px 16px rgba(99,102,241,0.1);}
.stat-card[onclick*="'takip'"]{background:linear-gradient(145deg,rgba(168,85,247,0.12),rgba(168,85,247,0.02));border-color:rgba(168,85,247,0.2);}
.stat-card[onclick*="'takip'"].aktif{background:rgba(168,85,247,0.18);border-color:var(--purple);box-shadow:0 4px 16px rgba(168,85,247,0.1);}
.stat-num{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;display:inline;margin-right:8px;}
.stat-lbl{font-size:12px;font-weight:600;text-transform:uppercase;display:inline;}
.filter-bar{padding:16px 24px;background:var(--surf);border-bottom:1px solid var(--bd);display:flex;gap:12px;flex-wrap:wrap;}
.search-inp{flex:1;min-width:250px;background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:10px 14px;}
.fsel{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:10px 14px;color:var(--text);}
.table-wrap{flex:1;overflow:auto;}
.table{width:100%;border-collapse:collapse;}
.table th{background:var(--surf);color:var(--sub);font-size:11px;text-transform:uppercase;padding:16px;text-align:left;border-bottom:2px solid var(--bd);position:sticky;top:0;}
.table td{padding:16px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.badge{padding:6px 10px;border-radius:8px;font-size:12px;font-weight:600;}
.b-green{background-color:var(--green-bg);color:var(--green);}
.b-orange{background-color:var(--orange-bg);color:var(--orange);}
.b-red{background-color:var(--red-bg);color:var(--red);}
.b-blue{background-color:var(--brbg);color:var(--br);}
.b-gray{background-color:var(--surf3);color:var(--text);}
.b-purple{background-color:var(--purple-bg);color:var(--purple);}

.hizli-karar-sel {
  cursor: pointer; outline: none; appearance: none; padding-right: 20px;
  background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' stroke='currentColor'%3E%3Cpath stroke-width='2' d='M19 9l-7 7-7-7'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 6px center; background-size: 10px;
}
.hizli-karar-sel option{background:var(--surf);color:var(--text);}

.act-btn{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;}
.act-pdf{background:var(--brbg);color:var(--br);}
.act-edit{background:var(--surf2);color:var(--text);}
.toplu-bar{position:fixed;bottom:0;left:0;right:0;display:none;gap:16px;padding:16px;background:var(--surf);border-top:1px solid var(--bd);z-index:99;justify-content:center;}
.toplu-bar.visible{display:flex;}

#notModalOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:999;}
.modal-box{background:var(--surf);width:500px;border-radius:16px;overflow:hidden;}
.modal-head{padding:16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:16px;}
.modal-body textarea{width:100%;height:150px;background:var(--bg);color:var(--text);border:1px solid var(--bd);border-radius:8px;padding:12px;}
.modal-foot{padding:16px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:12px;}

.search-wrapper { display:flex; flex:1; min-width:250px; gap:8px; }
.adv-filters { display:flex; gap:12px; flex-wrap:wrap; }
.filtre-btn { display:none; }

@media(max-width:768px){
  .search-wrapper { width:100%; flex:none; }
  .filtre-btn { display:flex; align-items:center; gap:6px; }
  .adv-filters { display:none; flex-direction:column; width:100%; padding-top:12px; margin-top:4px; border-top:1px solid var(--bd); }
  .adv-filters.show { display:flex; }
  .stat-row { padding: 12px 16px; gap: 8px; }
  .stat-card { padding: 8px 10px; min-width: 90px; border-radius: 12px; }
  .stat-num { font-size: 18px; line-height:1; margin-bottom: 4px; }
  .stat-lbl { font-size: 9px; line-height:1.2; }
  .filter-bar { padding: 12px 16px; }
  .tbtn { padding: 8px 12px; font-size: 13px; }
  .topbar { padding: 10px 16px; gap: 8px; }
  .table thead{display:none;}
  .table tbody{display:grid;gap:16px;padding:16px;}
  .table tr{display:flex;flex-direction:column;background:var(--surf);border:1px solid var(--bd);border-radius:16px;padding:16px;position:relative;}
  .table td{display:block;padding:8px 0;border:none;}
  .table td::before{content:attr(data-label);display:block;font-size:11px;color:var(--sub);text-transform:uppercase;margin-bottom:4px;}
  .table td:first-child{position:absolute;top:16px;right:16px;padding:0;}
  .table td:first-child::before, .table td:last-child::before{display:none;}
  .table td:last-child{border-top:1px dashed var(--bd);margin-top:8px;padding-top:16px;}
}
</style>
</head>
<body>
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1 class="ltitle">Sisteme Giriş</h1>
    <input type="password" id="sifreInput" placeholder="Şifre" onkeydown="if(event.key==='Enter')girisYap()">
    <button class="login-btn" onclick="girisYap()">Giriş Yap</button>
  </div>
</div>

<div class="app" id="appWrap">
  <div class="topbar">
    <div style="flex:1;font-weight:700;">Eğitimci Dil Konuşma Merkezi</div>
    <div class="tcount" id="topbarCount">—</div>
    <button class="tbtn tbtn-primary" onclick="window.open('https://halefadanur.github.io/ogrenci-form/form.html','_blank')">+ Yeni</button>
    <button class="tbtn tbtn-green" onclick="excelIndir()">Excel</button>
    <button class="tbtn" id="raporBtn" onclick="raporModalAc()" style="display:none;border-color:#8b5cf6;color:#8b5cf6;">📊 Yönetici Raporu</button>

  <!-- Rapor Ay Seçici Modal -->
  <div id="raporModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:var(--surf);border-radius:16px;padding:28px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.3);">
      <h3 style="margin-bottom:16px;font-size:16px;font-weight:700;">📊 Yönetici Raporu</h3>
      <label style="font-size:13px;color:var(--sub);font-weight:600;display:block;margin-bottom:8px;">Rapor Ayı</label>
      <select id="raporAySel" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--bd);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:20px;"></select>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button onclick="document.getElementById('raporModalOverlay').style.display='none'" style="padding:9px 18px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--sub);cursor:pointer;font-family:inherit;font-size:13px;">İptal</button>
        <button onclick="raporAc()" style="padding:9px 18px;border-radius:8px;border:none;background:#7C3AED;color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;">Raporu Aç</button>
      </div>
    </div>
  </div>
    <button class="tbtn" id="temaBtn" onclick="temaToggle()">🌙</button>
    <button class="tbtn" onclick="cikisYap()">Çıkış</button>
  </div>

  <div class="stat-row">
    <div class="stat-card aktif" onclick="statFiltrele('')">
      <div class="stat-num" id="statToplam">—</div><div class="stat-lbl">Tümü</div>
    </div>
    <div class="stat-card" onclick="statFiltrele('kayitli')">
      <div class="stat-num" id="statKayitli">—</div><div class="stat-lbl" style="color:var(--green)">Kayıtlı</div>
    </div>
    <div class="stat-card" onclick="statFiltrele('islemde')">
      <div class="stat-num" id="statIslemde">—</div><div class="stat-lbl" style="color:var(--orange)">İşlemde</div>
    </div>
    <div class="stat-card" onclick="statFiltrele('yakin')">
      <div class="stat-num" id="statAile">—</div><div class="stat-lbl" style="color:var(--br)">Yakın Takip</div>
    </div>
    <div class="stat-card" onclick="statFiltrele('takip')">
      <div class="stat-num" id="statTakip">—</div><div class="stat-lbl" style="color:var(--purple)">Takipte</div>
    </div>
  </div>

  <div class="filter-bar">
    <div class="search-wrapper">
      <input class="search-inp" type="text" id="aramaInput" placeholder="Ara..." oninput="filtrele()">
      <button class="tbtn filtre-btn" onclick="document.getElementById('advFilters').classList.toggle('show')">Filtreler <span style="font-size:10px">▼</span></button>
    </div>
    <div id="advFilters" class="adv-filters">
      <select class="fsel" id="sortSel" onchange="sCol=null; filtrele()">
        <option value="guncelleme">Son Güncelleme</option>
        <option value="tarih">Görüşme Tarihi</option>
        <option value="ad">Ad A-Z</option>
        <option value="sutun" style="display:none">Sütuna Göre</option>
      </select>
      <select class="fsel" id="kararGizleSel" onchange="kararGizleEkle()"><option value="">🚫 Buradan Karar Gizle...</option></select>
      <select class="fsel" id="kararSel" onchange="filtrele()"><option value="">Tüm Kararlar</option></select>
    </div>
  </div>
  <div id="gizlenenlerKutusu" style="margin-top:-10px; margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;"></div>

  <div class="table-wrap">
    <table class="table" id="mainTable">
      <thead>
        <tr>
          <th><input type="checkbox" id="checkAll" onclick="tumSecToggle(this)"></th>
          <th style="cursor:pointer;user-select:none" onclick="sutunaGoreSirala('ad')">ÖĞRENCİ ⇅</th>
          <th style="cursor:pointer;user-select:none" onclick="sutunaGoreSirala('gorusme_tarihi')">GÖRÜŞME ⇅</th>
          <th style="cursor:pointer;user-select:none" onclick="sutunaGoreSirala('tani')">TANI ⇅</th>
          <th style="cursor:pointer;user-select:none" onclick="sutunaGoreSirala('karar')">KARAR ⇅</th>
          <th style="cursor:pointer;user-select:none" onclick="sutunaGoreSirala('uzman')">UZMAN ⇅</th>
          <th>İŞLEMLER</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="toplu-bar" id="topluBar">
    <span class="tbtn" id="topluCount">0 seçildi</span>
    <button class="tbtn tbtn-primary" onclick="topluPdf()">Toplu PDF</button>
    <button class="tbtn" onclick="secimTemizle()">Temizle</button>
  </div>

  <div id="notModalOverlay">
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="notModalBaslik">Rehber Notu</h3>
        <button onclick="notModalKapat()" style="background:none;border:none;cursor:pointer;color:var(--text)">✕</button>
      </div>
      <div class="modal-body"><textarea id="notModalText"></textarea></div>
      <div class="modal-foot">
        <button class="tbtn" onclick="notModalKapat()">İptal</button>
        <button class="tbtn tbtn-primary" id="notModalSaveBtn" onclick="notModalKaydet()">Kaydet</button>
      </div>
    </div>
  </div>
</div>

<script>
function temaUygula(t){ document.documentElement.className=t; document.getElementById('temaBtn').textContent=t==='light'?'☀️':'🌙'; }
function temaToggle(){ const y=document.documentElement.className==='light'?'dark':'light'; localStorage.setItem('tema',y); temaUygula(y); }
if(localStorage.getItem('tema')==='light') temaUygula('light');

const SUPA_URL="https://zciraijmwxcwhryidlki.supabase.co";
const SUPA_KEY="sb_publishable_G1M4C_upyM7SMh59AOEhEA_pJ4MvEou";
let tumVeriler=[], filtreliVeriler=[];

function girisYap(){
  const s = document.getElementById('sifreInput').value;
  if(s==='enabiz2026'){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('appWrap').style.display='flex';
    sessionStorage.setItem('auth','1');
    sessionStorage.removeItem('tepe');
    verileriYukle();
  } else if(s==='Huzurum2026'){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('appWrap').style.display='flex';
    sessionStorage.setItem('auth','1');
    sessionStorage.setItem('tepe','1');
    verileriYukle();
  } else alert('Hatalı şifre');
}
function cikisYap(){ sessionStorage.removeItem('auth'); sessionStorage.removeItem('tepe'); location.reload(); }
if(sessionStorage.getItem('auth')==='1'){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('appWrap').style.display='flex';
  verileriYukle();
}

async function verileriYukle(){
  let all=[], from=0;
  while(true){
    const to=from+999;
    const res=await fetch(SUPA_URL+'/rest/v1/ogrenciler?order=created_at.desc',{headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,Range:from+'-'+to}});
    const data=await res.json();
    if(!data||!data.length) break;
    all=all.concat(data);
    if(data.length<1000) break;
    from+=1000;
  }
  tumVeriler=all;
  const ks=new Set();
  tumVeriler.forEach(r=>{ if(r.karar)ks.add(r.karar); });
  const ksSorted = [...ks].sort((a,b)=>{
    if(a==='KAYDEDİLDİ') return -1;
    if(b==='KAYDEDİLDİ') return 1;
    return a.localeCompare(b,'tr');
  });
  ksSorted.forEach(k=>{
    document.getElementById('kararSel').innerHTML+=`<option value="${k}">${k}</option>`;
    document.getElementById('kararGizleSel').innerHTML+=`<option value="${k}">${k}</option>`;
  });
  istatistikGuncelle();
  filtrele();
  // Tepe yönetici ise rapor butonunu göster
  if(sessionStorage.getItem('tepe')==='1'){
    const btn = document.getElementById('raporBtn');
    if(btn) btn.style.display='inline-flex';
  }
}

const K_KAYITLI=['KAYDEDİLDİ','Kaydedilecek','Özel Ders Alacak'];
const K_ISLEMDE=['İşlemde'];
const K_AILE=['Aile Düşünecek','Aile Takip Edecek','Başka Kurumda Kayıtlı, Düşünecek','Başka Kurumda Kayıtlı, Kaydolacak','Kaydedilecek'];
const K_TAKIP=['Takibe Alındı'];

function istatistikGuncelle(data){
  const d = data || tumVeriler;
  document.getElementById('statToplam').textContent=d.length;
  document.getElementById('statKayitli').textContent=d.filter(r=>K_KAYITLI.includes(r.karar)).length;
  document.getElementById('statIslemde').textContent=d.filter(r=>K_ISLEMDE.includes(r.karar)).length;
  document.getElementById('statAile').textContent=d.filter(r=>K_AILE.includes(r.karar)).length;
  document.getElementById('statTakip').textContent=d.filter(r=>K_TAKIP.includes(r.karar)).length;
}

function statFiltrele(tip){
  window._st = tip==='kayitli'?K_KAYITLI : tip==='islemde'?K_ISLEMDE : tip==='yakin'?K_AILE : tip==='takip'?K_TAKIP : null;
  document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('aktif'));
  event.currentTarget.classList.add('aktif');
  filtrele();
}

function uzmanNormalize(u){
  if(!u) return '';
  const s = u.trim().toLowerCase().replace(/i/g,'i');
  if(s==='serpil' || s.startsWith('serpil ')) return 'Serpil';
  if(s==='esmer' || s.startsWith('esmer ')) return 'Esmer';
  if(s==='kurumsal') return 'Kurumsal';
  if(s==='necmiye' || s.startsWith('necmiye ')) return 'Necmiye';
  if(s==='senanur' || s.startsWith('senanur ')) return 'Senanur';
  if(s==='aynur' || s.startsWith('aynur ')) return 'Aynur';
  // Diğerleri: baş harf büyük
  return u.charAt(0).toUpperCase() + u.slice(1);
}

function filtrele(){
  const q=document.getElementById('aramaInput').value.toLowerCase();
  const k=document.getElementById('kararSel').value;
  
  filtreliVeriler = tumVeriler.filter(r=>{
    if(r.karar && gizlenenKararlar.includes(r.karar)) return false;
    if(k && r.karar!==k) return false;
    if(window._st && !window._st.includes(r.karar)) return false;
    if(q){
      const t=(r.ad+' '+r.soyad+' '+r.tani+' '+r.karar+' '+uzmanNormalize(r.uzman)).toLowerCase();
      if(!t.includes(q)) return false;
    }
    return true;
  });
  
  const sort = document.getElementById('sortSel').value;
  filtreliVeriler.sort((a,b)=>{
    if(sort==='sutun' && sCol) {
      let v1 = a[sCol]||''; let v2 = b[sCol]||'';
      const c = String(v1).localeCompare(String(v2), 'tr', {sensitivity:'base'});
      return sAsc ? c : -c;
    }
    if(sort==='guncelleme') return (b.created_at||'').localeCompare(a.created_at||'');
    if(sort==='tarih') return (b.gorusme_tarihi||'').localeCompare(a.gorusme_tarihi||'');
    return (a.ad||'').localeCompare(b.ad||'');
  });

  document.getElementById('topbarCount').textContent = filtreliVeriler.length;
  tabloDoldur();
  istatistikGuncelle(filtreliVeriler);
}

let sCol = null, sAsc = true;
let gizlenenKararlar = [];

function kararGizleEkle() {
  const sel = document.getElementById('kararGizleSel');
  const val = sel.value;
  if(val && !gizlenenKararlar.includes(val)) gizlenenKararlar.push(val);
  sel.value = ""; 
  gizlenenlerRender();
  filtrele();
}

function gizlemeKaldir(val) {
  gizlenenKararlar = gizlenenKararlar.filter(k => k !== val);
  gizlenenlerRender();
  filtrele();
}

function gizlenenlerRender() {
  const kutu = document.getElementById('gizlenenlerKutusu');
  kutu.innerHTML = '';
  gizlenenKararlar.forEach(k => {
    kutu.innerHTML += `<span style="background:var(--red); color:white; padding:4px 10px; border-radius:12px; font-size:12px; cursor:pointer; box-shadow:0 2px 4px rgba(209,43,30,0.2)" onclick="gizlemeKaldir('${k}')" title="Gizlemeyi kaldır">✖ ${k}</span>`;
  });
}

function sutunaGoreSirala(col){
  if(sCol===col) sAsc = !sAsc; else { sCol = col; sAsc = true; }
  const sel=document.getElementById('sortSel');
  if(![...sel.options].some(o=>o.value==='sutun')) sel.innerHTML += '<option value="sutun" style="display:none">Sütuna Göre</option>';
  sel.value = 'sutun';
  filtrele();
}

function tFmt(t){return t?t.split('-').reverse().join('.'):'';}
function bdg(k){
  if(!k) return 'b-gray';
  if(['KAYDEDİLDİ','Kaydedilecek'].includes(k)) return 'b-green';
  if(k==='RED') return 'b-red';
  if(k==='Takibe Alındı') return 'b-purple';
  return 'b-orange';
}

function kSel(id,k){
  const opts = ['KAYDEDİLDİ','Aile Düşünecek','Aile Takip Edecek','Ayrıldı (Biz Ayırdık)','Ayrıldı (Memnun Değil)','Ayrıldı (Zorunlu Sebeplerle)','Başka Kuruma Gitti','Başka Kurumda Kayıtlı, Düşünecek','Başka Kurumda Kayıtlı, Kaydolacak','ERİKLİ','Eski Kurumuna Devam','İlaç Tedavisi/Beklesin','İşlemde','Kaydedilecek','Mezun Oldu','Özel Ders Alacak','Rapor Çıkmadı','Rapor İhtiyacı Yok','Rapor Yenilemedi (Kurum)','Rapor Yenilemedi (Veli)','Rapordan Vazgeçti','RED','Takibe Alındı','Takibe Alındı (MHRS var)','Takibe Alındı (MHRS yok)'];
  let h=`<select class="hizli-karar-sel badge ${bdg(k)}" onchange="kGuncelle('${id}',this.value,this)"><option value="">Seçilmedi</option>`;
  opts.forEach(o=>h+=`<option ${o===k?'selected':''}>${o}</option>`);
  return h+'</select>';
}

async function kGuncelle(id,nk,el){
  el.disabled=true;
  try{
    const now = new Date().toISOString();
    const kayit = tumVeriler.find(o=>o.id===id)||{};
    const eskiKarar = kayit.karar||'';
    const karar_degisim = eskiKarar ? eskiKarar+' → '+nk : nk;
    await fetch(SUPA_URL+'/rest/v1/ogrenciler?id=eq.'+id,{method:'PATCH',headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json'},body:JSON.stringify({karar:nk,karar_guncelleme:now,karar_degisim:karar_degisim})});
    kayit.karar=nk;
    kayit.karar_degisim=karar_degisim;
    el.className=`hizli-karar-sel badge ${bdg(nk)}`;
    istatistikGuncelle();
  }catch(e){alert('Hata');}
  el.disabled=false;
}

function tabloDoldur(){
  const tb = document.getElementById('tableBody');
  tb.innerHTML = filtreliVeriler.map(r=>`
    <tr>
      <td data-label=""><input type="checkbox" class="rchk" value="${r.id}" onchange="chkUp()"></td>
      <td data-label="Öğrenci"><strong>${r.ad||''} ${r.soyad||''}</strong></td>
      <td data-label="Görüşme">${tFmt(r.gorusme_tarihi)}</td>
      <td data-label="Tanı">${r.tani?`<span class="badge b-blue">${r.tani}</span>`:''}</td>
      <td data-label="Karar">${kSel(r.id, r.karar)}</td>
      <td data-label="Uzman">${uzmanNormalize(r.uzman)}</td>
      <td data-label="">
        <button class="act-btn act-edit" onclick="window.open('https://halefadanur.github.io/ogrenci-form/edit.html?admin=1&id=${r.id}')">Düzenle</button>
        <button class="act-btn act-pdf" style="background:var(--orange-bg);color:var(--orange);margin-bottom:4px;" onclick="notAc('${r.id}','yonetici_notu')">Yönetici Notu</button>
        <button class="act-btn act-pdf" onclick="notAc('${r.id}','rehber_notu')">Rehber Notu</button>
      </td>
    </tr>
  `).join('');
}

let actId=null, actTip=null;
function notAc(id, tip){
  actId=id; actTip=tip;
  const o=tumVeriler.find(x=>x.id===id);
  const lbl = tip==='yonetici_notu' ? 'Yönetici Notu' : 'Rehber Notu';
  document.getElementById('notModalBaslik').textContent=o.ad+' - '+lbl;
  document.getElementById('notModalText').value=o[tip]||'';
  document.getElementById('notModalOverlay').style.display='flex';
}
function notModalKapat(){ document.getElementById('notModalOverlay').style.display='none'; }
async function notModalKaydet(){
  const val = document.getElementById('notModalText').value;
  try{
    const now = new Date().toISOString();
    const req = {}; req[actTip] = val;
    if(actTip === 'rehber_notu') req['rehber_guncelleme'] = now;
    if(actTip === 'yonetici_notu') req['yonetici_notu_guncelleme'] = now;
    await fetch(SUPA_URL+'/rest/v1/ogrenciler?id=eq.'+actId,{method:'PATCH',headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json'},body:JSON.stringify(req)});
    tumVeriler.find(x=>x.id===actId)[actTip]=val;
    if(actTip === 'rehber_notu') tumVeriler.find(x=>x.id===actId).rehber_guncelleme = now;
    if(actTip === 'yonetici_notu') tumVeriler.find(x=>x.id===actId).yonetici_notu_guncelleme = now;
    notModalKapat();
  }catch(e){alert('Hata');}
}

function chkUp(){
  const c=document.querySelectorAll('.rchk:checked').length;
  document.getElementById('topluBar').style.display=c?'flex':'none';
  document.getElementById('topluCount').textContent=c+' seçildi';
}
function tumSecToggle(e){ document.querySelectorAll('.rchk').forEach(c=>c.checked=e.checked); chkUp(); }
function secimTemizle(){ document.querySelectorAll('.rchk').forEach(c=>c.checked=false); chkUp(); }
async function topluPdf(){
  const idler = [...document.querySelectorAll('.rchk:checked')].map(c=>c.value);
  if(!idler.length) return;
  const btn = document.querySelector('#topluBar .tbtn-primary');
  if(btn){btn.textContent='⏳ Yükleniyor...';btn.disabled=true;}
  try{
    const kayitlar = [];
    for(const id of idler){
      const res = await fetch(SUPA_URL+'/rest/v1/ogrenciler?id=eq.'+id,{headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}});
      const data = await res.json();
      if(data&&data[0]) kayitlar.push(data[0]);
    }
    if(!kayitlar.length) return;
    const PDF_URL = 'https://halefadanur.github.io/ogrenci-form/pdf.html';
    const yeni = window.open('','_blank');
    yeni.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Toplu PDF</title>
<style>body{font-family:sans-serif;background:#f0ede8;margin:0}.bar{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:12px 20px;display:flex;gap:10px;align-items:center;position:sticky;top:0;z-index:99}.bar h3{flex:1;font-size:14px;font-weight:700;margin:0}.bar button{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit}.btnp{background:#fff;color:#764ba2}.btnx{background:rgba(255,255,255,.2);color:#fff}@media print{.bar{display:none!important}}</style>
</head><body>
<div class="bar"><h3>${kayitlar.length} öğrenci — Toplu PDF</h3><button class="btnp" onclick="window.print()">🖨️ Yazdır</button><button class="btnx" onclick="window.close()">✕</button></div>
<div id="ic"></div>
<script>const K=${JSON.stringify(kayitlar)};const w=document.getElementById('ic');K.forEach(r=>{const d=encodeURIComponent(JSON.stringify(r));const div=document.createElement('div');div.style.cssText='page-break-after:always';div.innerHTML='<iframe src="${PDF_URL}?d='+d+'&tip=TAM+FORM" style="width:100%;height:1200px;border:none;display:block;" onload="this.style.height=(this.contentWindow.document.body.scrollHeight+40)+\\'px\\'"></iframe>';w.appendChild(div);});<\/script></body></html>`);
    yeni.document.close();
  }catch(e){alert('Hata: '+e.message);}
  if(btn){btn.textContent='Toplu PDF';btn.disabled=false;}
}

function excelIndir(){
  const s = filtreliVeriler.map(r=>({Ad:r.ad||'',Soyad:r.soyad||'',Görüşme:r.gorusme_tarihi||'',Uzman:r.uzman||'',Tanı:r.tani||'',Karar:r.karar||'',Rehber:r.rehber_notu||''}));
  const ws = XLSX.utils.json_to_sheet(s);
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Liste");
  XLSX.writeFile(wb, "Ogrenciler.xlsx");
}

function raporModalAc() {
  const sel = document.getElementById('raporAySel');
  sel.innerHTML = '';
  const simdi = new Date();
  for(let i=0; i<12; i++){
    const d = new Date(simdi.getFullYear(), simdi.getMonth()-i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const lbl = d.toLocaleString('tr-TR',{month:'long',year:'numeric'});
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = lbl;
    if(i===0) opt.selected = true;
    sel.appendChild(opt);
  }
  document.getElementById('raporModalOverlay').style.display = 'flex';
}
